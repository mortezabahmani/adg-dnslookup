; ─────────────────────────────────────────────────────────────
;  adg_sync — configuration file
;  Copy this file to config.ini and edit the values below.
; ─────────────────────────────────────────────────────────────

[adguard]
; AdGuard Home base URL (no trailing slash)
url = http://192.168.1.1:3000
username = admin
; Password: prefer the AGH_PASSWORD environment variable (more secure).
; If set, the env var always overrides the value below.
; Uncomment the next line only if you cannot use env vars:
; password = your_password_here

[github]
; GitHub repository in "owner/repo" format
repo = mortezabahmani/adg-dnslookup
; Branch to pull resolved JSON from
branch = main

[resolvers]
; ── DoH (DNS-over-HTTPS) resolvers for standalone mode ──
; At least 2-3 are recommended for majority-vote consensus.
; You may add your own anti-censorship resolvers as doh_4, doh_5, etc.
doh_1 = https://cloudflare-dns.com/dns-query
doh_2 = https://dns.google/resolve
doh_3 = https://dns.quad9.net:5053/dns-query
; doh_4 = https://your-custom-resolver.com/dns-query

; ── DoT (DNS-over-TLS) resolvers (requires dnspython) ──
; Uncomment to enable DoT as additional resolvers.
; dot_1 = tls://1.1.1.1:853
; dot_2 = tls://8.8.8.8:853

[lists]
; Comma-separated list of enabled list names.
; These must match filenames in lists/*.txt (without extension)
; or resolved/*.json on GitHub.
enabled = google,cloudflare,meta,microsoft,social,streaming,dev,cdn,cloud

[sync]
; Remove rewrites for domains that are no longer present in any enabled list.
cleanup_old = true
; Path to the sync log file (relative to working directory or absolute).
log_file = adg_sync.log
